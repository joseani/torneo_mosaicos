<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torneo de Mosaicos</title>
<style>
  body {
    font-family: -apple-system, Arial, sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 20px;
    text-align: center;
    color: #222;
  }
  h1 { font-size: 1.4em; margin-bottom: 5px; }
  #progreso {
    color: #666;
    margin-bottom: 25px;
    font-size: 0.95em;
  }
  #instruccion {
    font-size: 1.1em;
    margin-bottom: 20px;
    font-weight: bold;
  }
  #contenedor-partido {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
  }
  .tarjeta {
    background: white;
    border: 3px solid #ddd;
    border-radius: 12px;
    padding: 15px;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
    max-width: 280px;
  }
  .tarjeta:hover {
    border-color: #4285f4;
    transform: scale(1.03);
  }
  .tarjeta img {
    width: 100%;
    max-width: 240px;
    image-rendering: pixelated;
    display: block;
    margin: 0 auto 10px auto;
    border: 1px solid #ccc;
  }
  .tarjeta button {
    width: 100%;
    padding: 10px;
    font-size: 1em;
    background: #4285f4;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }
  .tarjeta button:hover { background: #3367d6; }
  #pantalla-final {
    display: none;
  }
  #pantalla-final table {
    margin: 20px auto;
    border-collapse: collapse;
  }
  #pantalla-final td, #pantalla-final th {
    border: 1px solid #ccc;
    padding: 8px 16px;
  }
  #mensaje-espera {
    color: #4285f4;
    font-weight: bold;
  }
</style>
</head>
<body>

<h1 id="pregunta"></h1>
<div id="progreso"></div>

<div id="contenedor-partido"></div>
<div id="mensaje-espera"></div>

<div id="pantalla-final">
  <h2>¡Gracias por participar!</h2>
  <p>Estos han sido los mosaicos ganadores de cada motivo:</p>
  <table id="tabla-ganadores"></table>
</div>

<script>
// ======= CONFIGURACIÓN =======
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw284RJ7LTEetMTGXjrnH3-uF9mUuaV-E1QUuYdOh6Y9abeqUuZ7d4ufQ2LHVpJKCuKTg/exec";

const motivos = ["einstein", "frankenstein", "liberty", "mona"];

const nombresLegibles = {
  "einstein": "Albert Einstein",
  "frankenstein": "Frankenstein",
  "liberty": "la Estatua de la Libertad",
  "mona": "la Mona Lisa"
};

const TOTAL_VOTOS = 44; // 11 comparaciones x 4 motivos

const metodos = [
  "cuantiles_barrido", "cuantiles_barridoRAP", "cuantiles_directa", "cuantiles_partes",
  "division_barrido", "division_barridoRAP", "division_directa", "division_partes",
  "kmeans_barrido", "kmeans_barridoRAP", "kmeans_directa", "kmeans_partes"
];

// ======= IDENTIFICADOR DE USUARIO (aleatorio, uno por sesión) =======
function generarIdUsuario() {
  return 'u-' + Date.now().toString(36) + '-' + Math.random().toString(36).substring(2, 10);
}
const idUsuario = generarIdUsuario();

// ======= ESTADO DEL TORNEO =======
let motivosOrden = shuffle(motivos.slice());
let motivoIndex = 0;

let players = [];      // métodos vivos en la ronda actual
let round = [];        // partidos [ [metodoA, metodoB], ... ] pendientes en esta ronda
let byeWinner = null;  // si el número de jugadores es impar, uno pasa directo
let currentMatchIndex = 0;
let winnersRonda = [];
let ganadoresPorMotivo = {};
let numeroVotoGlobal = 0; // cuenta todos los votos del usuario, del 1 al 44

// ======= FUNCIONES =======
function shuffle(array) {
  const a = array.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function iniciarMotivoActual() {
  players = shuffle(metodos.slice());
  winnersRonda = [];
  prepararRonda();
}

function prepararRonda() {
  let jugadoresRonda = shuffle(players.slice());
  byeWinner = null;
  if (jugadoresRonda.length % 2 === 1) {
    byeWinner = jugadoresRonda.pop();
  }
  round = [];
  for (let i = 0; i < jugadoresRonda.length; i += 2) {
    round.push([jugadoresRonda[i], jugadoresRonda[i + 1]]);
  }
  currentMatchIndex = 0;
  winnersRonda = byeWinner ? [byeWinner] : [];
  mostrarPartidoActual();
}

function motivoActual() {
  return motivosOrden[motivoIndex];
}

function rutaImagen(motivo, metodo) {
  return "images/" + motivo + "_" + metodo + ".png";
}

function mostrarPartidoActual() {
  actualizarProgreso();

  if (currentMatchIndex >= round.length) {
    // La ronda ha terminado
    if (winnersRonda.length === 1) {
      // Este motivo ha terminado: tenemos un ganador
      ganadoresPorMotivo[motivoActual()] = winnersRonda[0];
      siguienteMotivo();
    } else {
      // Empezar siguiente ronda con los ganadores de esta
      players = winnersRonda;
      prepararRonda();
    }
    return;
  }

  const [metodoA, metodoB] = round[currentMatchIndex];
  const motivo = motivoActual();
  const nombreMotivo = nombresLegibles[motivo] || motivo;
  const numeroPreguntaActual = numeroVotoGlobal + 1;

  document.getElementById("pregunta").innerText =
    `¿Cuál de estos dos mosaicos te gusta más para representar a ${nombreMotivo}? ` +
    `(pregunta ${numeroPreguntaActual}/${TOTAL_VOTOS})`;

  document.getElementById("contenedor-partido").innerHTML = `
    <div class="tarjeta" onclick="elegir('${metodoA}', '${metodoB}')">
      <img src="${rutaImagen(motivo, metodoA)}" alt="Opción A">
    </div>
    <div class="tarjeta" onclick="elegir('${metodoB}', '${metodoA}')">
      <img src="${rutaImagen(motivo, metodoB)}" alt="Opción B">
    </div>
  `;
}

function elegir(elegido, otro) {
  const motivo = motivoActual();
  numeroVotoGlobal++;

  enviarVoto(motivo, elegido, otro, elegido, numeroVotoGlobal);

  winnersRonda.push(elegido);
  currentMatchIndex++;
  mostrarPartidoActual();
}

function siguienteMotivo() {
  motivoIndex++;
  if (motivoIndex >= motivosOrden.length) {
    mostrarPantallaFinal();
  } else {
    iniciarMotivoActual();
  }
}

function actualizarProgreso() {
  const motivo = motivoActual();
  document.getElementById("progreso").innerText =
    `Motivo ${motivoIndex + 1} de ${motivosOrden.length} (${motivo}) — ` +
    `Quedan ${players.length} candidatos en esta fase`;
}

function mostrarPantallaFinal() {
  document.getElementById("contenedor-partido").style.display = "none";
  document.getElementById("progreso").innerText = "Torneo completado";
  document.getElementById("pantalla-final").style.display = "block";

  let filas = "<tr><th>Motivo</th><th>Método ganador</th></tr>";
  for (const motivo of motivos) {
    filas += `<tr><td>${motivo}</td><td>${ganadoresPorMotivo[motivo]}</td></tr>`;
  }
  document.getElementById("tabla-ganadores").innerHTML = filas;
}

function enviarVoto(motivo, elegida, otra, resultado, numeroVoto) {
  fetch(APPS_SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify({
      idUsuario: idUsuario,
      numeroVoto: numeroVoto,
      motivo: motivo,
      imagen_A: elegida,
      imagen_B: otra,
      elegida: resultado
    })
  }).catch(err => console.error("Error al enviar voto:", err));
}

// ======= ARRANQUE =======
iniciarMotivoActual();
</script>

</body>
</html>
